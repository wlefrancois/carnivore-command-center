<script type="module">
  const msg = document.getElementById("authMsg");
  const dbg = document.getElementById("debugMsg");
  msg.textContent = "JS loaded ✅ (attaching handlers...)";

  try {
    const mod = await import("/js/app.js");
    const { signIn, signUp, supabase } = mod;

    dbg.textContent = "Imported /js/app.js ✅";

    const email = document.getElementById("email");
    const password = document.getElementById("password");

    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");

    loginBtn.addEventListener("click", async () => {
      msg.textContent = "Logging in...";
      try {
        const { error } = await signIn(email.value.trim(), password.value);

        if (error) {
          msg.textContent = error.message;
          return;
        }

        const { data } = await supabase
          .from("daily_logs")
          .select("id")
          .limit(1);

        if (!data || data.length === 0) {
          window.location.href = "/app/onboarding/";
        } else {
          window.location.href = "/app/dashboard/";
        }
      } catch (e) {
        msg.textContent = "Login error: " + (e?.message || e);
      }
    });

    signupBtn.addEventListener("click", async () => {
      msg.textContent = "Creating account...";
      try {
        const { error } = await signUp(email.value.trim(), password.value);
        if (error) msg.textContent = error.message;
        else msg.textContent = "Account created. Check your email to confirm, then login.";
      } catch (e) {
        msg.textContent = "Signup error: " + (e?.message || e);
      }
    });

    msg.textContent = "Ready ✅ Enter email + password, then click Login or Create Account.";
  } catch (e) {
    msg.textContent = "Module load failed ❌";
    dbg.textContent = "Error: " + (e?.message || e);
  }
</script>
