<script type="module">
  import { signIn, signUp } from "/js/app.js";

  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const msg = document.getElementById("authMsg");

  document.getElementById("loginBtn").addEventListener("click", async () => {
    try {
      msg.textContent = "Logging in...";
      const { error } = await signIn(email.value.trim(), password.value);
      if (error) msg.textContent = error.message;
      else window.location.href = "/app/dashboard/";
    } catch (e) {
      msg.textContent = "JS error: " + (e?.message || e);
    }
  });

  document.getElementById("signupBtn").addEventListener("click", async () => {
    try {
      msg.textContent = "Creating account...";
      const { error } = await signUp(email.value.trim(), password.value);
      if (error) msg.textContent = error.message;
      else msg.textContent = "Account created. Check your email (if confirmation is enabled), then login.";
    } catch (e) {
      msg.textContent = "JS error: " + (e?.message || e);
    }
  });
</script>
