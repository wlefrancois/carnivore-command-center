<section class="page-hero">
  <div class="container">
    <h1>Dashboard</h1>
    <p class="lead">Your last 7 logs + today’s status.</p>

    <div class="hero__cta">
      <a class="btn btn--primary" href="/app/log/">Log Today</a>
      <button class="btn btn--ghost" id="logoutBtn" type="button">Logout</button>
    </div>

    <p id="userLine" class="micro muted" style="margin-top:10px;"></p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div id="todayCard" class="card" style="margin-bottom:14px;"></div>
    <div id="logs"></div>
  </div>
</section>

<script type="module">
  import { supabase, getUser, signOut } from "/js/app.js";

  const userLine = document.getElementById("userLine");
  const todayCard = document.getElementById("todayCard");
  const logsEl = document.getElementById("logs");

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "/app/";
  });

  function todayISODate() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  async function load() {
    const user = await getUser();
    if (!user) {
      window.location.href = "/app/";
      return;
    }

    userLine.textContent = `Logged in as ${user.email}`;

    const { data, error } = await supabase
      .from("daily_logs")
      .select("log_date, energy, sleep_hours, water_oz, mood, digestion, inflammation, notes")
      .order("log_date", { ascending: false })
      .limit(7);

    if (error) {
      todayCard.textContent = `Error loading logs: ${error.message}`;
      return;
    }

    const today = todayISODate();
    const todayLog = (data || []).find(r => r.log_date === today);

    todayCard.innerHTML = todayLog
      ? `<strong>Today logged ✅</strong><div class="micro muted" style="margin-top:6px;">
          Energy: ${todayLog.energy ?? "-"} • Mood: ${todayLog.mood ?? "-"} • Sleep: ${todayLog.sleep_hours ?? "-"} • Water: ${todayLog.water_oz ?? "-"}
        </div>`
      : `<strong>Today not logged yet</strong><div class="micro muted" style="margin-top:6px;">
          Click “Log Today” to add your entry.
        </div>`;

    logsEl.innerHTML = (data || []).map(r => `
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
          <strong>${r.log_date}</strong>
          <span class="micro muted">
            Energy: ${r.energy ?? "-"} • Sleep: ${r.sleep_hours ?? "-"} • Water: ${r.water_oz ?? "-"}
          </span>
        </div>
        ${r.notes ? `<div class="micro muted" style="margin-top:6px;">${escapeHtml(r.notes).slice(0,180)}</div>` : ""}
      </div>
    `).join("") || `<div class="card">No logs yet. Click “Log Today”.</div>`;
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  load();
</script>
